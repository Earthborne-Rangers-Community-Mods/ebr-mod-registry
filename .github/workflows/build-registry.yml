name: Build registry.json

on:
  push:
    branches: [main]
    paths:
      - "mods/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build registry.json from mods/*.json
        run: node scripts/build-registry.js

      - name: Commit registry.json if changed
        run: |
          git config user.name "ebr-mod-registry-bot[bot]"
          git config user.email "3494042+ebr-mod-registry-bot[bot]@users.noreply.github.com"
          git add registry.json
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild registry.json [skip ci]"
            git push
          fi
